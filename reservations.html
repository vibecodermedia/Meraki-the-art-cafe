  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

00-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { background: #F6F1E9; }\n  ::selection { background: #7C8A5B; color: #F6F1E9; }\n  input::placeholder, textarea::placeholder { color: #A39C8E; }\n  @media (max-width: 860px) { [data-layout] { grid-template-columns: 1fr !important; } }\n  @media (max-width: 720px) { [data-navlink] { display: none !important; } }\n  @media (max-width: 560px) {\n    [data-fieldpair] { grid-template-columns: 1fr !important; }\n    [data-giftcard] { flex-wrap: wrap !important; }\n    [data-giftcard] button { width: 100%; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Manrope', sans-serif; color: #2C2A26; background: #EFE7D8; min-height: 100vh;\">\n\n  <!-- NAV -->\n  <nav style=\"position: sticky; top: 0; z-index: 90; display: flex; align-items: center; justify-content: space-between; padding: 20px clamp(20px, 5vw, 64px); background: rgba(239,231,216,.9); backdrop-filter: saturate(1.4) blur(14px); border-bottom: 1px solid rgba(44,40,30,.08);\">\n    <a href=\"/\" style=\"font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 3px; color: #2C2A26; text-decoration: none; font-weight: 500;\">MERAKI<span style=\"display:block; font-family:'Manrope',sans-serif; font-size:9px; letter-spacing:2.5px; font-weight:500; opacity:.72; margin-top:3px;\">THE ART CAFÉ<\u002Fspan><\u002Fa>\n    <div style=\"display: flex; align-items: center; gap: clamp(16px, 2.4vw, 36px);\">\n      <a href=\"/\" data-navlink=\"\" style=\"display: {{ deskNav }}; font-size: 12.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #2C2A26; text-decoration: none; opacity: .82;\">Home<\u002Fa>\n      <a href=\"/menu\" data-navlink=\"\" style=\"display: {{ deskNav }}; font-size: 12.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #2C2A26; text-decoration: none; opacit t-weight: 500; font-size: clamp(38px, 5vw, 68px); line-height: 1.0;\">We'll keep a seat <span style=\"font-style: italic; color: #E9DEC9;\">for you.<\u002Fspan><\u002Fh1>\n        <p style=\"margin-top: 24px; font-size: 16px; line-height: 1.8; color: #C8C2B4; font-weight: 300; max-width: 40ch;\">Tables, workshop seats and private gatherings, tell us what you're after and we'll confirm within a few hours.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position: relative; z-index: 2; margin-top: 48px; display: grid; gap: 20px;\">\n        <div style=\"border-top: 1px solid rgba(246,241,233,.14); padding-top: 14px;\"><div style=\"font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8A8578;\">Hours<\u002Fdiv><div style=\"font-size: 15px; color: #E9E3D6; font-weight: 300; margin-top: 5px;\">Tue–Sun · 9:00am – 11:00pm<br>Closed Mondays<\u002Fdiv><\u002Fdiv>\n        <div style=\"border-top: 1px solid rgba(246,241,233,.14); padding-top: 14px;\"><div style=\"font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8A8578;\">Call to book faster<\u002Fdiv><div style=\"font-size: 15px; color: #E9E3D6; font-weight: 300; margin-top: 5px;\">+91 90000 00000<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- RIGHT FORM -->\n    <section style=\"padding: clamp(40px, 6vw, 80px) clamp(24px, 5vw, 72px); display: flex; align-items: flex-start;\">\n      <div style=\"width: 100%; max-width: 620px; margin: 0 auto;\">\n\n        <!-- TABS -->\n        <div style=\"display: flex; gap: 8px; margin-bottom: 34px; flex-wrap: wrap;\">\n          <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"font-family: 'Manrope', sans-serif; font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; padding: 11px 20px; border-radius: 100px; cursor: pointer; transition: all .3s ease; border: 1px solid {{ t.border }}; background: {{ t.bg }}; color: {{ t.color }};\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background: #FFF; border-radius: 18px; padding: clamp(36px, 5vw, 56px); text-align: center; box-shadow: 0 30px 60px -40px rgba(44,40,30,.4);\">\n            <div style=\"width: 60px; height: 60px; margin: 0 auto 20px; border-radius: 50%; background: #7C8A5B; display: flex; align-items: center; justify-content: center; color: #F6F1E9; font-size: 28px;\">✓<\u002Fdiv>\n            <h2 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 34px; color: #2C2A26;\">Thank you, {{ fName }}.<\u002Fh2>\n            <p style=\"margin-top: 12px; font-size: 15px; line-height: 1.7; color: #5A554C; font-weight: 300;\">{{ doneMsg }}<\u002Fp>\n            <button sc-camel-on-click=\"{{ reset }}\" style=\"margin-top: 26px; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; color: #2C2A26; background: transparent; border: 1px solid rgba(44,40,30,.3); padding: 13px 26px; border-radius: 100px; cursor: pointer;\" style-hover=\"background: #2C2A26; color: #F6F1E9;\">Make another request<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h2 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(26px, 3.6vw, 40px); color: #2C2A26; margin-bottom: 8px;\">{{ formTitle }}<\u002Fh2>\n            <p style=\"font-size: 15px; line-height: 1.7; color: #5A554C; font-weight: 300; margin-bottom: 28px;\">{{ formSub }}<\u002Fp>\n            <div style=\"display: grid; gap: 16px;\">\n              <div data-fieldpair=\"\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n                <label style=\"display: block;\"><span style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8578; display: block; margin-bottom: 7px;\">Full name<\u002Fspan><input value=\"{{ fName }}\" sc-camel-on-input=\"{{ onName }}\" placeholder=\"Your name\" style=\"width: 100%; background: #FFF; border: 1px solid rgba(44,40,30,.14); border-radius: 12px; padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; color: #2C2A26; outline: none;\"><\u002Flabel>\n                <label style=\"display: block;\"><span style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8578; display: block; margin-bottom: 7px;\">Phone<\u002Fspan><input value=\"{{ fPhone }}\" sc-camel-on-input=\"{{ onPhone }}\" placeholder=\"+91 …\" style=\"width: 100%; background: #FFF; border: 1px solid rgba(44,40,30,.14); border-radius: 12px; padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; color: #2C2A26; outline: none;\"><\u002Flabel>\n              <\u002Fdiv>\n              <div data-fieldpair=\"\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n                <label style=\"display: block;\"><span style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8578; display: block; margin-bottom: 7px;\">{{ dateLabel }}<\u002Fspan><input value=\"{{ fDate }}\" sc-camel-on-input=\"{{ onDate }}\" type=\"date\" style=\"width: 100%; background: #FFF; border: 1px solid rgba(44,40,30,.14); border-radius: 12px; padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; color: #2C2A26; outline: none;\"><\u002Flabel>\n                <label style=\"display: block;\"><span style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8578; display: block; margin-bottom: 7px;\">{{ pickLabel }}<\u002Fspan>\n                  <sc-raw-select value=\"{{ fPick }}\" sc-camel-on-change=\"{{ onPick }}\" style=\"width: 100%; background: #FFF; border: 1px solid rgba(44,40,30,.14); border-radius: 12px; padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; color: #2C2A26; outline: none;\">\n                    <sc-for list=\"{{ pickOptions }}\" as=\"o\" hint-placeholder-count=\"4\"><option>{{ o }}<\u002Foption><\u002Fsc-for>\n                  <\u002Fsc-raw-select>\n                <\u002Flabel>\n              <\u002Fdiv>\n              <label style=\"display: block;\"><span style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8578; display: block; margin-bottom: 7px;\">Anything we should know?<\u002Fspan><textarea value=\"{{ fNote }}\" sc-camel-on-input=\"{{ onNote }}\" rows=\"3\" placeholder=\"Dietary notes, occasion, seating preference…\" style=\"width: 100%; background: #FFF; border: 1px solid rgba(44,40,30,.14); border-radius: 12px; padding: 14px 16px; font-family: 'Manrope', sans-serif; font-size: 15px; color: #2C2A26; outline: none; resize: vertical;\"><\u002Ftextarea><\u002Flabel>\n              <button sc-camel-on-click=\"{{ submit }}\" style=\"margin-top: 6px; background: #2C2A26; color: #F6F1E9; border: none; border-radius: 100px; padding: 17px; font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase; cursor: pointer; transition: background .3s;\" style-hover=\"background: #B5613B;\">{{ submitLabel }}<\u002Fbutton>\n              <p style=\"font-size: 12.5px; color: #8A8578; text-align: center; font-weight: 300;\">No deposit needed. We confirm every request personally.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- GIFT CARD NOTE -->\n        <sc-if value=\"{{ showGift }}\" hint-placeholder-val=\"{{ true }}\">\n        <div data-giftcard=\"\" style=\"margin-top: 40px; background: #FFF; border-radius: 16px; padding: 26px; display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 40px -36px rgba(44,40,30,.4);\">\n          <div style=\"width: 64px; height: 64px; border-radius: 12px; background: linear-gradient(150deg,#C49A6C,#B5613B); flex-shrink: 0; overflow: hidden;\"><img src=\"eb77ef62-f447-48ab-8f09-cc5b2ca1aa8d\" alt=\"Meraki gift card\" style=\"width: 100%; height: 100%; object-fit: cover;\"><\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #2C2A26;\">Meraki Gift Cards<\u002Fdiv>\n            <p style=\"font-size: 13.5px; line-height: 1.6; color: #7A7468; font-weight: 300; margin-top: 3px;\">Give someone a slow afternoon. Available from ₹1,000, redeemable on food, coffee and workshops.<\u002Fp>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ giftTab }}\" style=\"font-size: 12px; letter-spacing: 1.4px; text-transform: uppercase; color: #2C2A26; background: transparent; border: 1px solid rgba(44,40,30,.3); padding: 12px 20px; border-radius: 100px; cursor: pointer; white-space: nowrap;\" style-hover=\"background: #2C2A26; color: #F6F1E9;\">Buy<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"text-align: center; padding: 40px 20px 44px; font-size: 12px; letter-spacing: .4px; color: #A39C8C;\">© 2026 Meraki, The Art Café · Designed by <a href=\"https://vibecodermedia.com\" target=\"_blank\" rel=\"noopener\" style=\"color: #8A6740; text-decoration: none;\">vibecodermedia<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;table&quot;,&quot;options&quot;:[&quot;table&quot;,&quot;workshop&quot;,&quot;event&quot;,&quot;gift&quot;],&quot;tsType&quot;:&quot;'table'|'workshop'|'event'|'gift'&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;showGiftCard&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: null, done: false, fName: '', fPhone: '', fDate: '', fPick: '', fNote: '' };\n\n  get config() {\n    return {\n      table: { label: 'Reserve a Table', title: 'Reserve a table', sub: 'For parties up to 6. Larger groups, use Private Events.', dateLabel: 'Date', pickLabel: 'Guests', options: ['2 guests','3 guests','4 guests','5 guests','6 guests'], submit: 'Request Reservation', done: 'Your table request is in, we\\u2019ll confirm your time by message shortly.' },\n      workshop: { label: 'Book a Workshop', title: 'Book a workshop seat', sub: 'Reserve your spot in an upcoming session. Materials included.', dateLabel: 'Preferred date', pickLabel: 'Session', options: ['Paint & Sip','Pottery','Calligraphy','Block Printing','Coffee Ritual'], submit: 'Reserve My Seat', done: 'Seat reserved, we\\u2019ll send session details and what to bring.' },\n      event: { label: 'Private Event', title: 'Plan a private event', sub: 'Birthdays, offsites, celebrations for 8–40 guests.', dateLabel: 'Event date', pickLabel: 'Group size', options: ['8–12 guests','12–20 guests','20–30 guests','30–40 guests'], submit: 'Send Enquiry', done: 'Enquiry received, our events host will reach out to shape your day.' },\n      gift: { label: 'Gift Card', title: 'Send a gift card', sub: 'A slow afternoon at Meraki, delivered by email.', dateLabel: 'Send on', pickLabel: 'Amount', options: ['₹1,000','₹2,000','₹3,500','₹5,000'], submit: 'Purchase Gift Card', done: 'Your gift is on its way, the recipient will receive it on your chosen date.' },\n    };\n  }\n\n  setTab = (t) => () => this.setState({ tab: t, done: false, fPick: '' });\n  submit = () => { if (this.state.fName.trim()) this.setState({ done: true }); };\n  reset = () => this.setState({ done: false, fName: '', fPhone: '', fDate: '', fPick: '', fNote: '' });\n\n  renderVals() {\n    const s = this.state;\n    const tab = s.tab ?? (this.props.defaultTab ?? 'table');\n    const cfg = this.config[tab];\n    const tabsList = [['table','Table'],['workshop','Workshop'],['event','Private Event'],['gift','Gift Card']];\n    const tabs = tabsList.map(([k, label]) => ({\n      label, onClick: this.setTab(k),\n      bg: tab === k ? '#B5613B' : 'transparent',\n      color: tab === k ? '#F6F1E9' : '#5A554C',\n      border: tab === k ? '#B5613B' : 'rgba(44,40,30,.2)',\n    }));\n    return {\n      deskNav: 'inline',\n      layoutCols: 'minmax(0, .85fr) minmax(0, 1.15fr)',\n      showGift: this.props.showGiftCard ?? true,\n      tabs,\n      done: s.done,\n      showForm: !s.done,\n      formTitle: cfg.title, formSub: cfg.sub,\n      dateLabel: cfg.dateLabel, pickLabel: cfg.pickLabel, pickOptions: cfg.options,\n      submitLabel: cfg.submit, doneMsg: cfg.done,\n      fName: s.fName, fPhone: s.fPhone, fDate: s.fDate, fPick: s.fPick, fNote: s.fNote,\n      onName: (e) => this.setState({ fName: e.target.value }),\n      onPhone: (e) => this.setState({ fPhone: e.target.value }),\n      onDate: (e) => this.setState({ fDate: e.target.value }),\n      onPick: (e) => this.setState({ fPick: e.target.value }),\n      onNote: (e) => this.setState({ fNote: e.target.value }),\n      submit: this.submit,\n      reset: this.reset,\n      giftTab: this.setTab('gift'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
